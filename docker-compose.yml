services:
  homeassistant:
    build: .
    image: localthings-ha-dev
    container_name: localthings-ha
    # host networking is required — DTLS runs over UDP and won't
    # traverse Docker's bridge NAT to reach LAN appliances.
    network_mode: host
    volumes:
      - ./ha_config:/config
      - ./custom_components/localthings:/config/custom_components/localthings:ro
    environment:
      - TZ=America/Chicago
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8123/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
